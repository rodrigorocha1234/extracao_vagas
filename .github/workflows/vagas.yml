name: Coletar Vagas

on:
  schedule:
    # Segunda a sexta às 19:00 UTC
    - cron: '0 19 * * 1-5'

  workflow_dispatch:

jobs:
  scraper:

    runs-on: ubuntu-latest
    env:
      TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
      CHAT_ID_TELEGRAM: ${{ secrets.CHAT_ID_TELEGRAM }}


    steps:


      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar extrator vagas
        run: |
          python main_extracao.py